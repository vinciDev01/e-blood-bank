{% extends 'frontend/serviceMedicaux/base.html' %}
{% block content %}
<link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="anonymous" />

<div style="padding:16px;">
    <h1 style="font-size:20px;font-weight:600;margin-bottom:12px;">Carte des banques de sang</h1>
    <div id="carte-banques" style="width:100%;height:70vh;border-radius:12px;"></div>
    <p id="carte-message" style="display:none;color:#6b7280;margin-top:12px;">
        Aucune banque de sang localisée pour le moment.
    </p>
</div>

{{ banques|json_script:"banques-data" }}

<script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="anonymous"></script>
<script>
    function initCarteBanques() {
        const banques = JSON.parse(document.getElementById('banques-data').textContent);
        const conteneur = document.getElementById('carte-banques');

        if (!banques.length) {
            conteneur.style.display = 'none';
            document.getElementById('carte-message').style.display = 'block';
            return;
        }

        // Boîte englobante du Togo (avec une légère marge) : la carte est
        // verrouillée sur le pays, sans débordement vers les pays voisins.
        const bornesTogo = L.latLngBounds([5.9, -0.4], [11.3, 2.0]);

        const carte = L.map(conteneur, {
            maxBounds: bornesTogo,
            maxBoundsViscosity: 1.0,
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(carte);

        banques.forEach(function (b) {
            const marqueur = L.marker([b.lat, b.lng]).addTo(carte);

            const wrapper = document.createElement('div');
            wrapper.style.fontSize = '13px';
            wrapper.style.maxWidth = '220px';

            const titre = document.createElement('strong');
            titre.textContent = b.nom;
            wrapper.appendChild(titre);
            wrapper.appendChild(document.createElement('br'));

            wrapper.appendChild(document.createTextNode(b.adresse + ', ' + b.ville));
            wrapper.appendChild(document.createElement('br'));

            const tel = document.createElement('a');
            tel.href = 'tel:' + encodeURIComponent(b.telephone);
            tel.textContent = b.telephone;
            wrapper.appendChild(tel);

            marqueur.bindPopup(wrapper);
        });

        // Vue initiale = le Togo entier, et on interdit de dézoomer au-delà.
        carte.fitBounds(bornesTogo);
        carte.setMinZoom(carte.getZoom());
    }

    document.addEventListener('DOMContentLoaded', initCarteBanques);
</script>
{% endblock %}
